<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daily Dollar</title>

<meta name="theme-color" content="#1b1424">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Dollar">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..800,50,1&family=Outfit:wght@300..700&display=swap" rel="stylesheet">

<style>
  :root {
    /* dusk over the canyon */
    --bg:        #1b1424;
    --bg-2:      #241a30;
    --card:      #271d34;
    --edge:      #3b2e4c;

    --cream:     #f7eee1;
    --muted:     #a294b4;

    /* 70s park poster */
    --sun:       #f2a541;
    --clay:      #d9633f;
    --rose:      #e2879b;
    --sage:      #8cb86a;
    --pine:      #6aa85f;
    --teal:      #4f9a95;

    --good:      #8cb86a;
    --bad:       #d9543f;
    --hollow:    #4a3d5c;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { background: var(--bg); }
  body {
    margin: 0;
    min-height: 100dvh;                 /* 100vh overshoots on iOS */
    color: var(--cream);
    font: 400 16px/1.45 "Outfit", -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(120% 60% at 50% 0%, #3a2440 0%, rgba(58,36,64,0) 62%),
      var(--bg);
    background-repeat: no-repeat;
    overscroll-behavior-y: none;        /* no rubber-band bounce */
  }

  /* viewport-fit=cover + black-translucent means content runs under the
     clock and the home indicator — inset all four sides. */
  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding-top:    calc(env(safe-area-inset-top) + 18px);
    padding-bottom: calc(env(safe-area-inset-bottom) + 32px);
    padding-left:   calc(env(safe-area-inset-left) + 18px);
    padding-right:  calc(env(safe-area-inset-right) + 18px);
  }

  /* ---------- header: the sun over the ridge ---------- */
  header { position: relative; text-align: center; margin-bottom: 20px; }

  .sun-badge {
    width: 100%; height: 62px; position: relative; overflow: hidden;
    border-radius: 999px 999px 8px 8px;
    background: linear-gradient(180deg, var(--sun) 0%, var(--clay) 55%, var(--rose) 100%);
    display: flex; align-items: flex-end; justify-content: center;
  }
  /* the pale rings of a 70s poster sun */
  .sun-badge::before {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(
      180deg,
      rgba(255,242,225,0.00) 0px, rgba(255,242,225,0.00) 9px,
      rgba(255,242,225,0.22) 9px, rgba(255,242,225,0.22) 12px);
  }
  .sun-badge h1 {
    position: relative;
    margin: 0 0 9px;
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "SOFT" 50, "WONK" 1, "opsz" 100;
    font-weight: 700;
    font-size: 27px;
    letter-spacing: -0.015em;
    color: #2a1420;
  }

  .subhead {
    display: flex; align-items: center; justify-content: center; gap: 9px;
    margin-top: 11px; font-size: 11.5px; letter-spacing: 0.19em;
    text-transform: uppercase; color: var(--muted);
  }
  .subhead .rule { flex: 1; height: 1px; background: var(--edge); max-width: 60px; }

  .gear {
    display: block; margin: 12px auto 0;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.05); border: 1px solid var(--edge);
    color: var(--muted); font-size: 15px; cursor: pointer;
    line-height: 1; padding: 0;
  }
  .gear:active { background: rgba(255,255,255,0.11); color: var(--cream); }

  /* ---------- card ---------- */
  .card {
    background: linear-gradient(180deg, var(--card) 0%, var(--bg-2) 100%);
    border: 1px solid var(--edge);
    border-radius: 22px;
    padding: 20px 18px 24px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.32);
  }

  /* ---------- the dot field ---------- */
  .grid {
    display: grid;
    grid-auto-flow: column;
    grid-template-rows: repeat(7, var(--dot, 14px));
    gap: var(--gap, 5px);
    justify-content: center;
    margin: 2px 0 4px;
  }
  .dot {
    width: var(--dot, 14px); height: var(--dot, 14px);
    border-radius: 4px;
    padding: 0; cursor: pointer;
    background: transparent;
    border: 1.5px solid var(--hollow);      /* logged nothing = hollow */
    transition: transform 0.08s ease;
  }
  .dot.good   { background: var(--good); border-color: var(--good); }
  .dot.bad    { background: var(--bad);  border-color: var(--bad); }
  .dot.future { border-color: rgba(74,61,92,0.45); }
  .dot.future.soon { border-color: rgba(122,104,146,0.7); border-style: dashed; }
  .dot.today  { box-shadow: 0 0 0 2px var(--bg-2), 0 0 0 3.5px var(--sun); }
  .dot.sel    { box-shadow: 0 0 0 2px var(--bg-2), 0 0 0 3.5px var(--muted); }
  .dot:active { transform: scale(0.86); }

  /* ---------- weekly envelope meter ---------- */
  .week { margin-top: 20px; }
  .week-top {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 11.5px; color: var(--muted);
    font-variant-numeric: tabular-nums; margin-bottom: 7px;
  }
  .week-label { letter-spacing: 0.19em; text-transform: uppercase; }
  .week-label em { font-style: normal; opacity: 0.6; }
  .readout .day.back { color: var(--sun); cursor: pointer; }
  .week-top b { color: var(--cream); font-weight: 500; }
  .week-bar {
    height: 6px; border-radius: 999px; overflow: hidden;
    background: rgba(255,255,255,0.07);
  }
  .week-fill {
    height: 100%; width: 0;
    background: linear-gradient(90deg, var(--sage), var(--teal));
    transition: width 0.35s ease;
  }
  .week-bar.over .week-fill { background: linear-gradient(90deg, var(--clay), var(--bad)); }

  .target-line {
    font-size: 12.5px; margin: -2px 0 6px;
    font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
  }
  .target-line.tight { color: var(--sun); }
  .target-line.loose { color: var(--sage); }
  .target-line.proj  { color: var(--muted); }
  .amount.proj { color: var(--teal); }
  .add:disabled { opacity: 0.28; box-shadow: none; cursor: default; }

  /* ---------- today readout ---------- */
  .readout { text-align: center; margin-top: 24px; }
  .readout .day {
    font-size: 11.5px; letter-spacing: 0.19em; text-transform: uppercase;
    color: var(--muted);
  }
  .readout .amount {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "SOFT" 50, "WONK" 1, "opsz" 144;
    font-weight: 600;
    font-size: 58px; line-height: 1.05;
    letter-spacing: -0.035em;
    margin: 8px 0 6px;
    font-variant-numeric: tabular-nums;
  }
  .amount.under { color: var(--sage); }
  .amount.over  { color: var(--bad); }
  .amount.zero  { color: var(--cream); }

  .goal-chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 13px; border-radius: 999px;
    border: 1px solid var(--edge); background: rgba(255,255,255,0.03);
    font-size: 12.5px; color: var(--muted); cursor: pointer;
  }
  .goal-chip b { color: var(--cream); font-weight: 500; }

  .add {
    display: block; width: 66px; height: 66px; margin: 26px auto 0;
    border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(160deg, var(--sun) 0%, var(--clay) 100%);
    color: #2a1420; font-size: 34px; font-weight: 300; line-height: 1;
    box-shadow: 0 7px 18px rgba(217,99,63,0.34);
  }
  .add:active { transform: scale(0.93); }

  /* ---------- entries ---------- */
  .entries { margin-top: 26px; }
  .entries h2 {
    font-size: 11.5px; letter-spacing: 0.19em; text-transform: uppercase;
    color: var(--muted); font-weight: 500; margin: 0 0 6px;
  }
  .entry {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
    padding: 11px 2px; border-bottom: 1px solid var(--edge);
    font-variant-numeric: tabular-nums; font-size: 17px;
  }
  .entry:last-child { border-bottom: none; }
  .entry .name {
    flex: 1; min-width: 0; font-size: 15.5px; color: var(--cream);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .entry .name.unnamed { color: var(--muted); font-style: italic; }
  .entry .amt { font-weight: 500; }
  .entry .neg { color: var(--teal); }
  .entry .del {
    background: none; border: none; color: var(--muted);
    font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1;
  }

  .fixed-line {
    font-size: 12.5px; color: var(--muted); margin: -2px 0 8px;
    font-variant-numeric: tabular-nums;
  }
  .entry.is-fixed .amt, .entry.is-fixed .name { opacity: 0.62; }
  .entry .tag {
    display: inline-block; margin-left: 7px; padding: 1px 7px;
    border-radius: 999px; border: 1px solid var(--edge);
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); vertical-align: middle;
  }

  /* quick-pick category chips in the add sheet */
  .chips { margin-top: 14px; }
  .chip-head {
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin: 12px 0 7px;
  }
  .chip-head:first-child { margin-top: 0; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip-row.fixed button { border-style: dotted; opacity: 0.85; }
  .chip-row.fixed button.on { opacity: 1; }

  .seg { display: flex; gap: 7px; margin-top: 12px; }
  .seg button {
    flex: 1; padding: 9px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--edge); background: rgba(255,255,255,0.04);
    color: var(--muted); font-family: "Outfit", sans-serif; font-size: 13px;
  }
  .seg button.on { background: var(--sun); border-color: var(--sun); color: #2a1420; font-weight: 500; }

  .chips button {
    padding: 7px 12px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--edge); background: rgba(255,255,255,0.04);
    color: var(--muted); font-family: "Outfit", sans-serif; font-size: 13px;
  }
  .chips button.on { background: var(--sun); border-color: var(--sun); color: #2a1420; font-weight: 500; }
  .chips button.chip-add  { border-style: dashed; color: var(--sage); }
  .chips button.chip-edit { color: var(--muted); opacity: 0.8; }
  .chips button.chip-edit.on { background: rgba(255,255,255,0.12); color: var(--cream); }
  .chips button.removable {
    border-color: var(--bad); color: var(--bad);
    padding-right: 26px; position: relative;
  }
  .chips button.removable::after {
    content: "×"; position: absolute; right: 9px; top: 50%;
    transform: translateY(-52%); font-size: 15px;
  }

  .modal input.name-field {
    font-size: 16px; text-align: left; padding: 13px 15px; margin-top: 11px;
  }
  .empty-note { color: var(--muted); font-size: 14px; padding: 10px 2px; font-style: italic; }

  /* ---------- sync status ---------- */
  .status {
    text-align: center; margin-top: 20px;
    font-size: 11px; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--muted); opacity: 0.65;
  }
  .status .pip {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--sage); margin-right: 6px; vertical-align: middle;
  }
  .status.local .pip { background: var(--sun); }

  /* ---------- pull to refresh ---------- */
  .ptr {
    position: fixed; left: 0; right: 0;
    top: calc(env(safe-area-inset-top) + 6px);
    display: flex; justify-content: center;
    pointer-events: none; z-index: 5; opacity: 0;
  }
  .ptr .ring {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid var(--edge); border-top-color: var(--sun);
    background: var(--bg-2);
  }
  .ptr.spin .ring { animation: ptrspin 0.7s linear infinite; }
  @keyframes ptrspin { to { transform: rotate(360deg); } }

  .wrap { transition: transform 0.22s cubic-bezier(.2,.8,.3,1); }
  .wrap.dragging { transition: none; }

  /* ---------- modals ---------- */
  .backdrop {
    position: fixed; inset: 0; background: rgba(14,8,20,0.72);
    backdrop-filter: blur(3px);
    display: none; align-items: center; justify-content: center;
    padding: 22px; z-index: 20;
  }
  .backdrop.open { display: flex; }
  .modal {
    width: 100%; max-width: 330px;
    background: linear-gradient(180deg, var(--card) 0%, var(--bg-2) 100%);
    border: 1px solid var(--edge); border-radius: 22px; padding: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .modal h3 {
    margin: 0 0 5px; font-size: 20px;
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "SOFT" 50, "WONK" 1;
    font-weight: 600; letter-spacing: -0.02em;
  }
  .modal p { margin: 0 0 16px; font-size: 13px; color: var(--muted); }
  .modal input {
    width: 100%; padding: 15px; border-radius: 14px;
    background: rgba(0,0,0,0.26); border: 1px solid var(--edge);
    color: var(--cream); font-size: 27px; text-align: center;
    font-family: "Outfit", sans-serif; font-variant-numeric: tabular-nums;
  }
  .modal input:focus { outline: none; border-color: var(--sun); }
  .row { display: flex; gap: 10px; margin-top: 16px; }
  .row button {
    flex: 1; padding: 13px; border-radius: 14px; border: none;
    font-family: "Outfit", sans-serif; font-size: 15px; font-weight: 500; cursor: pointer;
  }
  .btn-cancel { background: rgba(255,255,255,0.07); color: var(--cream); }
  .btn-ok { background: linear-gradient(160deg, var(--sun), var(--clay)); color: #2a1420; font-weight: 600; }
</style>
</head>
<body>
<div class="ptr" id="ptr"><div class="ring"></div></div>
<div class="wrap" id="wrap">

  <header>
    <div class="sun-badge"><h1>Daily Dollar</h1></div>
    <div class="subhead"><span class="rule"></span><span id="tagline">Dean, Kyle, Cleo and the Nodomoeter</span><span class="rule"></span></div>
  </header>

  <div class="card">
    <div class="grid" id="grid"></div>

    <div class="week">
      <div class="week-top">
        <span class="week-label">This week <em id="resetHint"></em></span>
        <span><b id="weekLeft">$1,400 left</b> · <span id="weekDays">7 days</span></span>
      </div>
      <div class="week-bar" id="weekBar"><div class="week-fill" id="weekFill"></div></div>
    </div>

    <div class="readout">
      <div class="day" id="dayLabel">Today</div>
      <div class="amount zero" id="amount">$0</div>
      <div class="target-line" id="targetLine" style="display:none"></div>
      <div class="fixed-line" id="fixedLine" style="display:none"></div>
      <button class="goal-chip" id="goalChip">daily goal <b id="goalVal">$200</b></button>
    </div>

    <button class="add" id="addBtn" aria-label="Add spend">+</button>
  </div>

  <div class="entries">
    <h2 id="entriesTitle">Today</h2>
    <div id="entryList"></div>
  </div>

  <div class="status" id="status"><span class="pip"></span><span id="statusText">connecting</span></div>
  <button class="gear" id="goalBtn" aria-label="Change daily goal">&#9881;</button>

</div>

<div class="backdrop" id="addModal">
  <div class="modal">
    <h3 id="addTitle">Add spend</h3>
    <p>Negative amounts undo a mistake — try <b>-12</b>.</p>
    <input type="text" inputmode="decimal" id="addInput" placeholder="0.00" autocomplete="off">
    <input type="text" class="name-field" id="nameInput" placeholder="What was it? (optional)" autocomplete="off">
    <div class="chips" id="chips"></div>
    <div class="row">
      <button class="btn-cancel" data-close>Cancel</button>
      <button class="btn-ok" id="addSave">Add</button>
    </div>
  </div>
</div>

<div class="backdrop" id="catModal">
  <div class="modal">
    <h3>New category</h3>
    <p>It'll show up as a quick-pick for both of you.</p>
    <input type="text" class="name-field" id="catInput" placeholder="e.g. Laundry" autocomplete="off">
    <div class="seg">
      <button id="catLive" class="on">In the moment</button>
      <button id="catFixed">Committed</button>
    </div>
    <div class="row">
      <button class="btn-cancel" data-close>Cancel</button>
      <button class="btn-ok" id="catSave">Add</button>
    </div>
  </div>
</div>

<div class="backdrop" id="goalModal">
  <div class="modal">
    <h3>Daily goal</h3>
    <p>Days at or under this stay green.</p>
    <input type="text" inputmode="decimal" id="goalInput" autocomplete="off">
    <div class="row">
      <button class="btn-cancel" data-close>Cancel</button>
      <button class="btn-ok" id="goalSave">Save</button>
    </div>
  </div>
</div>

<script>
(function () {
  // ---- config ------------------------------------------------------------
  var SUPA_URL = 'https://sdafxhthxtafqtzaltaf.supabase.co';
  var SUPA_KEY = 'sb_publishable_R90eTho_4YY01IR0xApDnQ_Id_ujq95';
  var CACHE = 'dailyDollar.cache';
  var MAX_WEEKS = 30, MIN_WEEKS = 10;
  // Payday is Wednesday, so that's when the envelope resets and where the grid
  // columns break. 0 = Sunday … 3 = Wednesday.
  var WEEK_START = 3;
  var DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  // Used only until the categories table answers (or if it doesn't exist yet).
  var DEFAULT_CATEGORIES = [
    { id: 'd1', name: 'Gas' },
    { id: 'd2', name: 'Campsite' },
    { id: 'd3', name: 'Grocery Food or Beverage' },
    { id: 'd4', name: 'Non-Grocery Food or Beverage' },
    { id: 'd5', name: 'Uber' },
    { id: 'd6', name: 'Cleo' }
  ];

  // The `label` column / `categories` table may not exist yet — both are
  // detected on first pull so the app keeps working either way.
  var hasLabel = true, hasCategories = true;
  var editingChips = false;
  var pendingFixed = false;    // is the entry being added a committed cost?
  var newCatFixed  = false;    // which section a newly created category lands in

  // ---- state -------------------------------------------------------------
  // entries: [{id, day, amount}] — id is the Supabase row id, or a local "L…" string
  var state = loadCache();
  var selected = todayKey();
  var online = false;

  function loadCache() {
    try {
      var r = JSON.parse(localStorage.getItem(CACHE));
      if (r && Array.isArray(r.entries)) return r;
    } catch (e) {}
    return { goal: 200, entries: [], categories: DEFAULT_CATEGORIES.slice() };
  }
  function saveCache() { localStorage.setItem(CACHE, JSON.stringify(state)); }

  // ---- dates -------------------------------------------------------------
  function keyOf(d) {
    return d.getFullYear() + '-' +
           String(d.getMonth() + 1).padStart(2, '0') + '-' +
           String(d.getDate()).padStart(2, '0');
  }
  function todayKey() { return keyOf(new Date()); }
  function prettyDate(k) {
    var p = k.split('-');
    return new Date(+p[0], +p[1] - 1, +p[2])
      .toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function entriesFor(k) {
    return state.entries.filter(function (e) { return e.day === k; });
  }
  // Only live (non-fixed) spending decides the box color and the big number.
  // Rent and subscriptions are decisions made once, not daily ones — letting
  // them redden a day would train us to ignore red days. They're still logged.
  function totalFor(k) {
    var list = entriesFor(k);
    if (!list.length) return null;                    // null = never logged
    return list.reduce(function (a, e) {
      return a + (e.fixed ? 0 : Number(e.amount));
    }, 0);
  }
  // ---- the weekly envelope ------------------------------------------------
  // Allowance accrues at `goal` per day and resets on WEEK_START (payday).
  // Whatever balance is left from earlier in the week lands on today — over
  // yesterday lowers today, under raises it. Credit is uncapped: two genuinely
  // spend-free days should be worth two full days of room.
  //
  // Accrual never starts before the first day we ever logged, so days from
  // before the app existed can't quietly bank money. That also means a fresh
  // start (or a retroactive entry on an older day) settles itself.
  var DAY = 86400000;
  function midnight(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function daysBetween(a, b) { return Math.round((midnight(b) - midnight(a)) / DAY); }

  function firstLoggedDate() {
    var min = null;
    state.entries.forEach(function (e) { if (!min || e.day < min) min = e.day; });
    if (!min) return null;
    var p = min.split('-');
    return new Date(+p[0], +p[1] - 1, +p[2]);
  }

  function weekBounds(day) {
    var off = (day.getDay() - WEEK_START + 7) % 7;
    var s = new Date(day.getFullYear(), day.getMonth(), day.getDate() - off);
    return { start: s, end: new Date(s.getFullYear(), s.getMonth(), s.getDate() + 6) };
  }

  // What is (or will be) the target for `day`, given everything logged before
  // it? Works for a future day too — that's the projection you get by tapping
  // tomorrow, and it moves as today's spending changes.
  function targetFor(day) {
    var today = midnight(new Date());
    var wk = weekBounds(day);
    var first = firstLoggedDate() || today;
    var eff = first > wk.start ? first : wk.start;
    if (eff > day) eff = day;

    var before = daysBetween(eff, day);
    var spentBefore = 0;
    for (var i = 0; i < before; i++) {
      var d = new Date(eff.getFullYear(), eff.getMonth(), eff.getDate() + i);
      spentBefore += totalFor(keyOf(d)) || 0;
    }
    return state.goal + (state.goal * before - spentBefore);
  }

  function weekStats() {
    var today = midnight(new Date());
    var wk = weekBounds(today);

    var first = firstLoggedDate() || today;
    var eff = first > wk.start ? first : wk.start;     // accrue from whichever is later
    if (eff > today) eff = today;

    var spentWeek = 0;
    for (var i = 0; i <= daysBetween(eff, today); i++) {
      var d = new Date(eff.getFullYear(), eff.getMonth(), eff.getDate() + i);
      spentWeek += totalFor(keyOf(d)) || 0;            // live spend only
    }

    var budget = state.goal * (daysBetween(eff, wk.end) + 1);
    return {
      budget:   budget,
      spent:    spentWeek,
      left:     budget - spentWeek,
      daysLeft: daysBetween(today, wk.end) + 1,
      target:   targetFor(today),
      weekEnd:  wk.end
    };
  }

  function fixedTotalFor(k) {
    return entriesFor(k).reduce(function (a, e) {
      return a + (e.fixed ? Number(e.amount) : 0);
    }, 0);
  }
  function money(n) {
    var s = Math.abs(n).toFixed(2).replace(/\.00$/, '');
    return (n < 0 ? '−$' : '$') + s;
  }

  // ---- supabase (plain REST — no SDK) -------------------------------------
  function api(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign({
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json'
    }, opts.headers || {});
    return fetch(SUPA_URL + '/rest/v1/' + path, opts).then(function (r) {
      if (!r.ok) throw new Error(r.status + ' ' + path);
      return r.status === 204 ? null : r.json();
    });
  }

  function pull() {
    var cols = hasLabel ? 'id,day,amount,label,fixed' : 'id,day,amount';
    return Promise.all([
      api('entries?select=' + cols + '&order=id.asc'),
      api('settings?select=goal&id=eq.1')
    ]).then(function (res) {
      state.entries = res[0].map(function (e) {
        return { id: e.id, day: e.day, amount: Number(e.amount),
                 label: e.label || '', fixed: !!e.fixed };
      });
      if (res[1] && res[1][0]) state.goal = Number(res[1][0].goal);
      setOnline(true); saveCache(); render();
    }).catch(function () {
      if (hasLabel) { hasLabel = false; return pull(); }   // column not added yet
      setOnline(false); render();
    }).then(pullCategories);
  }

  function pullCategories() {
    if (!hasCategories) return;
    return api('categories?select=id,name,fixed&order=sort.asc,id.asc')
      .then(function (rows) {
        state.categories = rows.map(function (c) {
          return { id: c.id, name: c.name, fixed: !!c.fixed };
        });
        saveCache(); renderChips();
      })
      .catch(function () { hasCategories = false; });      // table not created yet
  }

  function setOnline(v) {
    online = v;
    var el = document.getElementById('status');
    el.className = 'status' + (v ? '' : ' local');
    document.getElementById('statusText').textContent =
      v ? 'synced' : 'this device only';
  }

  // ---- the dot field -----------------------------------------------------
  // Columns are weeks, rows are days of the week (Sun at top). The grid always
  // ends on the current week, and we render only as many weeks as fit — so the
  // right-hand column is today's week, flush with the card edge. No scrolling.
  function weeksThatFit() {
    var card = document.querySelector('.card');
    var inner = card.clientWidth - 36;                // card horizontal padding
    var dot = 14, gap = 5;
    var n = Math.floor((inner + gap) / (dot + gap));
    if (n < MIN_WEEKS) {                              // very narrow: shrink the dots
      dot = Math.max(9, Math.floor((inner + gap) / MIN_WEEKS) - gap);
      n = MIN_WEEKS;
    }
    document.documentElement.style.setProperty('--dot', dot + 'px');
    document.documentElement.style.setProperty('--gap', gap + 'px');
    return Math.min(n, MAX_WEEKS);
  }

  function buildGrid() {
    var grid = document.getElementById('grid');
    var weeks = weeksThatFit();
    grid.innerHTML = '';

    var today = new Date(); today.setHours(0, 0, 0, 0);
    var off = (today.getDay() - WEEK_START + 7) % 7;
    var start = new Date(today);
    start.setDate(start.getDate() - off);                  // payday of this week
    start.setDate(start.getDate() - (weeks - 1) * 7);      // first column

    var tKey = todayKey();
    var wkEnd = weekBounds(today).end;
    var frag = document.createDocumentFragment();

    for (var i = 0; i < weeks * 7; i++) {
      var d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
      var k = keyOf(d);
      var total = totalFor(k);

      var b = document.createElement('button');
      var cls = 'dot';
      // future days in the current envelope can be tapped for a projection;
      // past the reset the slate is wiped, so there's nothing to project
      if (d > today)          cls += (d <= wkEnd ? ' future soon' : ' future');
      else if (total !== null) cls += (total > state.goal ? ' bad' : ' good');
      // else: past with nothing logged — stays hollow grey

      if (k === tKey)        cls += ' today';
      else if (k === selected) cls += ' sel';

      b.className = cls;
      b.dataset.key = k;
      b.setAttribute('aria-label', k);
      frag.appendChild(b);
    }
    grid.appendChild(frag);
  }

  // ---- render ------------------------------------------------------------
  function renderWeek() {
    var w = weekStats();
    var pct = Math.max(0, Math.min(1, w.spent / w.budget));
    var over = w.left < 0;

    document.getElementById('weekFill').style.width = (pct * 100) + '%';
    document.getElementById('weekBar').classList.toggle('over', over);
    document.getElementById('weekLeft').textContent =
      over ? money(-w.left) + ' over' : money(w.left) + ' left';
    document.getElementById('weekDays').textContent =
      w.daysLeft + (w.daysLeft === 1 ? ' day' : ' days');
    document.getElementById('resetHint').textContent =
      '· resets ' + DAY_NAMES[WEEK_START].slice(0, 3);

    var line = document.getElementById('targetLine');

    if (isFutureSelected()) {
      var d = selectedDate();
      line.style.display = '';
      line.className = 'target-line proj';
      // beyond tomorrow the number assumes nothing gets spent in between —
      // say so, rather than implying it's a firm figure
      line.textContent = daysBetween(midnight(new Date()), d) === 1
        ? "tomorrow's projection · if today ends here"
        : 'projected · if you spend nothing until then';
      return;
    }

    // today's target only makes sense while looking at today
    if (selected === todayKey() && Math.round(w.target) !== Math.round(state.goal)) {
      line.style.display = '';
      line.className = 'target-line' + (w.target < state.goal ? ' tight' : ' loose');
      line.textContent = w.target <= 0
        ? 'no room left today'
        : "today's target " + money(w.target);
    } else {
      line.style.display = 'none';
    }
  }

  function selectedDate() {
    var p = selected.split('-');
    return new Date(+p[0], +p[1] - 1, +p[2]);
  }
  function isFutureSelected() { return selectedDate() > midnight(new Date()); }

  function render() {
    buildGrid();
    renderWeek();

    var future = isFutureSelected();
    var amt = document.getElementById('amount');
    var total = totalFor(selected);

    if (future) {
      // looking ahead: show what the day will allow, not what was spent
      var proj = targetFor(selectedDate());
      amt.textContent = proj <= 0 ? '$0' : money(proj);
      amt.className = 'amount proj';
    } else {
      amt.textContent = money(total || 0);
      amt.className = 'amount ' +
        (total === null ? 'zero' : total > state.goal ? 'over' : 'under');
    }

    document.getElementById('addBtn').disabled = future;

    var fx = fixedTotalFor(selected);
    var fxEl = document.getElementById('fixedLine');
    if (fx) {
      fxEl.style.display = '';
      fxEl.textContent = '+ ' + money(fx) + ' committed';
    } else {
      fxEl.style.display = 'none';
    }

    var isToday = selected === todayKey();
    var dl = document.getElementById('dayLabel');
    var ahead = future && daysBetween(midnight(new Date()), selectedDate()) === 1;
    dl.textContent = isToday ? 'Today'
                   : (ahead ? 'Tomorrow' : prettyDate(selected)) + '  ✕';
    dl.className = 'day' + (isToday ? '' : ' back');
    document.getElementById('goalVal').textContent = money(state.goal);
    document.getElementById('entriesTitle').textContent = isToday ? 'Today' : prettyDate(selected);

    var list = entriesFor(selected);
    var box = document.getElementById('entryList');
    box.innerHTML = '';
    if (future) {
      box.innerHTML = '<div class="empty-note">Hasn\'t happened yet.</div>';
      return;
    }
    if (!list.length) {
      box.innerHTML = '<div class="empty-note">Nothing logged yet.</div>';
      return;
    }
    list.forEach(function (e) {
      var row = document.createElement('div');
      row.className = 'entry';

      if (e.fixed) row.className += ' is-fixed';

      var name = document.createElement('span');
      name.className = 'name' + (e.label ? '' : ' unnamed');
      name.textContent = e.label || 'unnamed';
      if (e.fixed) {
        var tag = document.createElement('span');
        tag.className = 'tag'; tag.textContent = 'committed';
        name.appendChild(tag);
      }

      var amt = document.createElement('span');
      amt.className = 'amt' + (e.amount < 0 ? ' neg' : '');
      amt.textContent = money(e.amount);

      var del = document.createElement('button');
      del.className = 'del'; del.textContent = '×';
      del.setAttribute('aria-label', 'Delete entry');
      del.onclick = function () { removeEntry(e); };

      row.appendChild(name); row.appendChild(amt); row.appendChild(del);
      box.appendChild(row);
    });
  }

  // ---- mutations (optimistic, then sync) ---------------------------------
  function addEntry(amount, label, fixed) {
    var tmp = { id: 'L' + Date.now() + Math.random(), day: selected,
                amount: amount, label: label, fixed: !!fixed };
    state.entries.push(tmp);
    saveCache(); render();

    var body = { day: tmp.day, amount: tmp.amount };
    if (hasLabel) {
      if (label) body.label = label;
      body.fixed = !!fixed;
    }

    api('entries', {
      method: 'POST',
      headers: { 'Prefer': 'return=representation' },
      body: JSON.stringify(body)
    }).then(function (rows) {
      if (rows && rows[0]) tmp.id = rows[0].id;       // swap in the real id
      setOnline(true); saveCache();
    }).catch(function () { setOnline(false); });
  }

  function removeEntry(e) {
    state.entries = state.entries.filter(function (x) { return x !== e; });
    saveCache(); render();
    if (typeof e.id === 'number') {
      api('entries?id=eq.' + e.id, { method: 'DELETE' })
        .then(function () { setOnline(true); })
        .catch(function () { setOnline(false); });
    }
  }

  function setGoal(v) {
    state.goal = v; saveCache(); render();
    api('settings?id=eq.1', { method: 'PATCH', body: JSON.stringify({ goal: v }) })
      .then(function () { setOnline(true); })
      .catch(function () { setOnline(false); });
  }

  // ---- modals ------------------------------------------------------------
  function open(id, prefill) {
    var m = document.getElementById(id);
    m.classList.add('open');
    var inp = m.querySelector('input');
    inp.value = prefill === undefined ? '' : prefill;
    setTimeout(function () { inp.focus(); inp.select(); }, 60);
  }
  function close(id) { document.getElementById(id).classList.remove('open'); }

  document.querySelectorAll('[data-close]').forEach(function (b) {
    b.onclick = function () { b.closest('.backdrop').classList.remove('open'); };
  });
  document.querySelectorAll('.backdrop').forEach(function (bd) {
    bd.onclick = function (ev) { if (ev.target === bd) bd.classList.remove('open'); };
  });

  // ---- quick-pick chips --------------------------------------------------
  // Tap to fill the name, tap again to clear. The pencil toggles edit mode,
  // where tapping a chip deletes it instead.
  var chipBox = document.getElementById('chips');
  var nameInput = document.getElementById('nameInput');

  // Three ways to tag: type a name (always live), tap a live pill, or tap a
  // fixed pill. Whichever pill you tapped decides `pendingFixed`; typing by
  // hand resets it to live.
  function renderChips() {
    chipBox.innerHTML = '';
    var cur = nameInput.value.trim();

    function section(title, list, isFixed) {
      if (!list.length && !isFixed) return;
      var head = document.createElement('div');
      head.className = 'chip-head';
      head.textContent = title;
      chipBox.appendChild(head);

      var row = document.createElement('div');
      row.className = 'chip-row' + (isFixed ? ' fixed' : '');
      list.forEach(function (c) {
        var b = document.createElement('button');
        b.textContent = c.name;
        if (!editingChips && c.name === cur && pendingFixed === !!c.fixed) b.className = 'on';
        if (editingChips) b.classList.add('removable');
        b.onclick = function () {
          if (editingChips) { deleteCategory(c); return; }
          if (nameInput.value === c.name && pendingFixed === !!c.fixed) {
            nameInput.value = ''; pendingFixed = false;
          } else {
            nameInput.value = c.name; pendingFixed = !!c.fixed;
          }
          renderChips();
        };
        row.appendChild(b);
      });
      chipBox.appendChild(row);
    }

    var live  = state.categories.filter(function (c) { return !c.fixed; });
    var fixed = state.categories.filter(function (c) { return c.fixed; });

    section('In the moment', live, false);
    section('Committed — doesn’t count toward the day', fixed, true);

    var tools = document.createElement('div');
    tools.className = 'chip-row';

    var add = document.createElement('button');
    add.className = 'chip-add';
    add.textContent = '+ New';
    add.onclick = function () { newCatFixed = false; open('catModal'); syncCatToggle(); };
    tools.appendChild(add);

    var edit = document.createElement('button');
    edit.className = 'chip-edit' + (editingChips ? ' on' : '');
    edit.textContent = editingChips ? 'Done' : 'Edit';
    edit.onclick = function () { editingChips = !editingChips; renderChips(); };
    tools.appendChild(edit);

    chipBox.appendChild(tools);
  }

  function addCategory(name, fixed) {
    name = name.trim().slice(0, 40);
    if (!name) return;
    if (state.categories.some(function (c) { return c.name.toLowerCase() === name.toLowerCase(); })) return;

    var tmp = { id: 'L' + Date.now(), name: name, fixed: !!fixed };
    state.categories.push(tmp);
    saveCache(); renderChips();

    if (!hasCategories) return;
    api('categories', {
      method: 'POST',
      headers: { 'Prefer': 'return=representation' },
      body: JSON.stringify({ name: name, fixed: !!fixed, sort: 99 })
    }).then(function (rows) {
      if (rows && rows[0]) tmp.id = rows[0].id;
      saveCache();
    }).catch(function () { setOnline(false); });
  }

  function deleteCategory(c) {
    state.categories = state.categories.filter(function (x) { return x !== c; });
    saveCache(); renderChips();
    if (hasCategories && typeof c.id === 'number') {
      api('categories?id=eq.' + c.id, { method: 'DELETE' })
        .catch(function () { setOnline(false); });
    }
  }

  // typing by hand always means a live, in-the-moment expense
  nameInput.oninput = function () {
    pendingFixed = false;
    if (!editingChips) renderChips();
  };

  document.getElementById('addBtn').onclick = function () {
    nameInput.value = '';
    pendingFixed = false;
    editingChips = false;
    renderChips();
    // make it unmistakable which day you're adding to
    document.getElementById('addTitle').textContent =
      selected === todayKey() ? 'Add spend' : 'Add to ' + prettyDate(selected);
    open('addModal');
  };

  // tap the date label to come back to today
  document.getElementById('dayLabel').onclick = function () {
    if (selected === todayKey()) return;
    selected = todayKey();
    render();
  };

  function syncCatToggle() {
    document.getElementById('catLive').classList.toggle('on', !newCatFixed);
    document.getElementById('catFixed').classList.toggle('on', newCatFixed);
  }
  document.getElementById('catLive').onclick  = function () { newCatFixed = false; syncCatToggle(); };
  document.getElementById('catFixed').onclick = function () { newCatFixed = true;  syncCatToggle(); };

  document.getElementById('catSave').onclick = function () {
    var v = document.getElementById('catInput').value;
    close('catModal');
    addCategory(v, newCatFixed);
  };
  document.getElementById('catInput').onkeydown = function (e) {
    if (e.key === 'Enter') document.getElementById('catSave').click();
  };
  function openGoal() { open('goalModal', state.goal); }
  document.getElementById('goalBtn').onclick = openGoal;
  document.getElementById('goalChip').onclick = openGoal;

  function commitAdd() {
    var v = parseFloat(document.getElementById('addInput').value);
    var label = document.getElementById('nameInput').value.trim().slice(0, 60);
    var fx = pendingFixed;
    close('addModal');
    if (!isNaN(v) && v !== 0) addEntry(v, label, fx);
  }
  function commitGoal() {
    var v = parseFloat(document.getElementById('goalInput').value);
    close('goalModal');
    if (!isNaN(v) && v > 0) setGoal(v);
  }
  document.getElementById('addSave').onclick = commitAdd;
  document.getElementById('goalSave').onclick = commitGoal;
  document.getElementById('addInput').onkeydown = function (e) { if (e.key === 'Enter') commitAdd(); };
  document.getElementById('nameInput').onkeydown = function (e) { if (e.key === 'Enter') commitAdd(); };
  document.getElementById('goalInput').onkeydown = function (e) { if (e.key === 'Enter') commitGoal(); };

  document.getElementById('grid').onclick = function (e) {
    var dot = e.target.closest('.dot');
    if (!dot) return;
    if (dot.classList.contains('future') && !dot.classList.contains('soon')) return;
    selected = dot.dataset.key;
    render();
  };

  // ---- pull to refresh ---------------------------------------------------
  // There's no address bar in the home-screen app, so this is the only way to
  // force a sync by hand.
  (function () {
    var wrap = document.getElementById('wrap');
    var ptr  = document.getElementById('ptr');
    var TRIGGER = 62, MAX = 92;
    var startY = 0, dist = 0, tracking = false, busy = false;

    function move(d) {
      dist = d;
      wrap.style.transform = 'translateY(' + d + 'px)';
      ptr.style.transform  = 'translateY(' + (d * 0.55) + 'px) rotate(' + (d * 3.4) + 'deg)';
      ptr.style.opacity    = Math.min(1, d / TRIGGER);
    }
    function reset() {
      wrap.classList.remove('dragging');
      wrap.style.transform = '';
      ptr.style.transform = '';
      ptr.style.opacity = '';
      ptr.classList.remove('spin');
      dist = 0;
    }

    document.addEventListener('touchstart', function (e) {
      if (busy || e.touches.length !== 1) return;
      if (window.scrollY > 0) return;                         // only from the top
      if (document.querySelector('.backdrop.open')) return;   // not while a sheet is up
      startY = e.touches[0].clientY;
      tracking = true;
    }, { passive: true });

    document.addEventListener('touchmove', function (e) {
      if (!tracking) return;
      var dy = e.touches[0].clientY - startY;
      if (dy <= 0) { if (dist) { reset(); } tracking = false; return; }
      e.preventDefault();                                     // hold the page still
      wrap.classList.add('dragging');
      move(Math.min(MAX, dy * 0.5));                          // rubber-band feel
    }, { passive: false });

    document.addEventListener('touchend', function () {
      if (!tracking) return;
      tracking = false;
      if (dist < TRIGGER) { reset(); return; }

      busy = true;
      wrap.classList.remove('dragging');
      wrap.style.transform = 'translateY(46px)';
      ptr.style.transform = 'translateY(26px)';
      ptr.style.opacity = '1';
      ptr.classList.add('spin');

      var done = false;
      function finish() { if (done) return; done = true; reset(); busy = false; }

      Promise.all([
        pull().catch(function () {}),
        new Promise(function (r) { setTimeout(r, 500); })      // let the spin register
      ]).then(finish);
      setTimeout(finish, 4000);                                // never stick spinning
    }, { passive: true });
  })();

  // ---- keep the two phones in step ---------------------------------------
  window.addEventListener('resize', render);
  document.addEventListener('visibilitychange', function () { if (!document.hidden) pull(); });
  setInterval(function () { if (!document.hidden) pull(); }, 20000);

  renderChips();
  render();
  pull();
})();
</script>
</body>
</html>
